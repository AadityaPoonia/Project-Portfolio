# Copy to sources.yml and edit. sources.yml is gitignored (it names real
# schemas/tables); credentials live in .env, never here.

audit_log_path: logs/audit.jsonl

sources:
  - name: mysql
    engine: mysql
    env_prefix: main          # expects DB_HOST/_PORT/_USER/_PASSWORD/_NAME in .env
    schemas: [head]
    table_allowlist:
      ops:                      # omit a schema key or set to null for "all tables"
        - users
        - courses
        - enrollments
    column_overrides:           # human-reviewed tier overrides (win over heuristics)
      course_code: public
    sample_size: 100
    row_cap: 10000
    timeout_s: 60

  - name: users
    engine: mysql
    env_prefix: USER_DB
    schemas: [quicksight]

  - name: redshift
    engine: redshift
    env_prefix: DWH
    schemas: [public]
    timeout_s: 120
